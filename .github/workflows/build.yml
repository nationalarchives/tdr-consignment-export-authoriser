name: TDR Tag and pre deploy
on:
  push:
    branches:
      - master
permissions: {}
jobs:
  pre-deploy:
    permissions:
      id-token: write
      contents: read
    uses: nationalarchives/tdr-github-actions/.github/workflows/lambda_build.yml@27efbc03aaaa9696eea85ab7a9363d6f92733471 # v0.0.34
    with:
      lambda-name: export-api-authoriser
      repo-name: tdr-consignment-export-authoriser
      artifact-name: consignment-export-authoriser
      build-command: |
        sbt assembly
    secrets:
      MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
  deploy:
    needs: pre-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: gh workflow run deploy.yml -f environment=intg -f to-deploy="$NEXT_VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          NEXT_VERSION: ${{ needs.pre-deploy.outputs.next-version }}
